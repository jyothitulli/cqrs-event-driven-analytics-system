version: '3.8'

services:
  # Primary Write Database - PostgreSQL
  write-db:
    image: postgres:14-alpine
    container_name: ecommerce-write-db
    environment:
      POSTGRES_DB: write_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"  # Using 5435 to avoid conflict
    volumes:
      - postgres_write_data:/var/lib/postgresql/data
      - ./init-scripts/01-init-write-db.sql:/docker-entrypoint-initdb.d/01-init-write-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d write_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Read Database - Separate PostgreSQL for materialized views
  read-db:
    image: postgres:14-alpine
    container_name: ecommerce-read-db
    environment:
      POSTGRES_DB: read_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5436:5432"  # Using 5436 to avoid conflict
    volumes:
      - postgres_read_data:/var/lib/postgresql/data
      - ./init-scripts/02-init-read-db.sql:/docker-entrypoint-initdb.d/02-init-read-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d read_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Broker - RabbitMQ
  broker:
    image: rabbitmq:3-management
    container_name: ecommerce-broker
    ports:
      - "5672:5672"   # AMQP port for connections
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Command Service - Handles writes (products, orders)
  command-service:
    build: ./command-service
    container_name: ecommerce-command-service
    ports:
      - "8080:8080"
    depends_on:
      write-db:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:password@write-db:5432/write_db
      BROKER_URL: amqp://guest:guest@broker:5672/
      PORT: 8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Consumer Service - Processes events, updates read models
  consumer-service:
    build: ./consumer-service
    container_name: ecommerce-consumer-service
    ports:
      - "8082:8082"
    depends_on:
      write-db:
        condition: service_healthy
      read-db:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      READ_DATABASE_URL: postgresql://user:password@read-db:5432/read_db
      WRITE_DATABASE_URL: postgresql://user:password@write-db:5432/write_db
      BROKER_URL: amqp://guest:guest@broker:5672/
      PORT: 8082
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Query Service - Serves analytics from read database
  query-service:
    build: ./query-service
    container_name: ecommerce-query-service
    ports:
      - "8081:8081"
    depends_on:
      read-db:
        condition: service_healthy
    environment:
      READ_DATABASE_URL: postgresql://user:password@read-db:5432/read_db
      PORT: 8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_write_data:
  postgres_read_data: